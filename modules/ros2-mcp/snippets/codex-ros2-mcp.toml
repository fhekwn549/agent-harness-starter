# Optional ROS 2 MCP snippet. Review before merging into ~/.codex/config.toml.
#
# Required:
# - Install and review an external ROS MCP server.
# - Set ROS2_MCP_COMMAND to that server's launch command.

[mcp_servers.ros2]
command = "$PROJECT/.agent-harness/modules/ros2-mcp/ros2-mcp-wrapper.sh"

[mcp_servers.ros2.env]
ROS_DISTRO = "humble"
ROS_DOMAIN_ID = "0"
ROS2_MCP_READ_ONLY = "1"
ROS_WORKSPACE = "$HOME/ros2_ws"
ROS2_MCP_COMMAND = "uv --directory $HOME/src/ros2_mcp run mcp_ros_2_server"

